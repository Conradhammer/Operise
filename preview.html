<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operise | AI Automation Danmark</title>
    
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            font-size: 64px;
            margin: 0;
            letter-spacing: -2px;
        }

        p {
            font-size: 18px;
            color: #b3b3b3;
            margin-top: 20px;
        }

        .cta {
            margin-top: 40px;
        }

        .cta a {
            text-decoration: none;
            color: #fff;
            border: 1px solid #fff;
            padding: 12px 24px;
            border-radius: 8px;
            transition: 0.3s ease;
        }

        .cta a:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Operise</h1>
        <p>AI Automation til virksomheder i Danmark</p>

        <div class="cta">
            <a href="#">Kontakt os</a>
        </div>
    </div>

</body>
</html>
